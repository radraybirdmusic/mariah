<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CRi2 / MARIAH v1.66 - Kinetic Engine</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #0f0; height: 100vh; width: 100vw; }
        body.fae-active { background: #fff !important; color: #000 !important; }
        
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        #main-ui { 
            position: relative; 
            z-index: 100; 
            height: 100vh; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            /* Added padding-top to ensure we clear the very top of the screen */
            padding-top: 60px; 
            pointer-events: none; 
        }
        
        #bucket-grid { 
            display: grid; 
            grid-template-columns: repeat(16, 1fr); 
            gap: 4px; 
            width: 94%; 
            max-width: 800px; 
            /* margin-top here provides the extra 3-4 column "drop" you requested */
            margin: 40px auto; 
            pointer-events: auto; 
        }
        
        .bucket { 
            aspect-ratio: 1/1; 
            border: 1.5px solid #222; 
            border-radius: 50%; 
            background: rgba(10, 10, 10, 0.85); 
            position: relative; 
            transition: transform 0.1s;
        }
        .fae-active .bucket { border-color: #ccc; background: #f0f0f0; }

        /* The rolling playhead highlight */
        .bucket.playhead { 
            border: 2.5px solid #fff !important; 
            box-shadow: 0 0 15px #fff; 
            z-index: 50;
        }

        /* Active note being triggered */
        .bucket.active { 
            transform: scale(1.4); 
            box-shadow: 0 0 20px currentColor; 
            z-index: 100; 
        }
        
        #controls { 
            margin-top: auto;
            width: 100%; 
            padding-bottom: env(safe-area-inset-bottom, 20px); 
            pointer-events: auto; 
            display: flex; 
            flex-direction: column-reverse; 
            gap: 6px; 
            align-items: center; 
            background: rgba(0,0,0,0.8); 
        }
        .row { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; width: 100%; align-items: center; }
        .btn { background: #000; border: 1.5px solid #0f0; color: #0f0; padding: 8px 10px; cursor: pointer; text-transform: uppercase; font-weight: 700; font-size: 11px; border-radius: 5px; min-width: 65px; touch-action: none; }
        .btn.active { background: #0f0 !important; color: #000 !important; }
        .btn.kill { border-color: #fff; color: #fff; background: #600; width: 90%; font-size: 14px; padding: 10px; }
        .slider-box { background: #111; padding: 5px 10px; border: 1.5px solid #0ff; border-radius: 5px; display: flex; align-items: center; width: 160px; }
        input[type=range] { width: 100%; accent-color: #0ff; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; font-size: 24px; color: #0f0; z-index: 200000; cursor: pointer; text-align: center; }
    </style>
</head>
<body>
    <div id="overlay" onclick="setupEngine()">v1.66 KINETIC ENGINE<br>START CIRCUIT</div>
    <div id="main-ui">
        <div id="bucket-grid"></div>
        <div id="controls">
            <button class="btn kill" onclick="window.location.reload()">!! NUCLEAR RESET !!</button>
            <div class="row">
                <button id="btnRec" class="btn" style="border-color:#f00;color:#f00" onclick="toggleSeq('rec')">REC</button>
                <button id="btnPlay" class="btn" onclick="toggleSeq('play')">PLAY</button>
                <button id="btnFae" class="btn" onclick="toggleFae()">FAE</button>
            </div>
            <div class="row">
                <div class="slider-box"><input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.3" oninput="if(masterGain) masterGain.gain.value = this.value"></div>
            </div>
        </div>
    </div>
    <canvas id="vortexCanvas"></canvas>

<script>
    const bucketGrid = document.getElementById('bucket-grid');
    const buckets = [];
    for(let i=0; i<64; i++) { 
        let b = document.createElement('div'); 
        b.className = 'bucket'; b.id = 'bucket-' + i; 
        bucketGrid.appendChild(b); 
        buckets.push(b);
    }

    let audioCtx, masterGain;
    let voices = {}, mods = { fae: false };
    let seq = { rec: false, play: false, step: 0, data: new Array(64).fill(null) };
    let currentRgb = [0, 1, 0.5];

    function setupEngine() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.gain.value = 0.3; masterGain.connect(audioCtx.destination);
        document.getElementById('overlay').style.display = 'none';
    }

    function createVoice() {
        let v = { osc: audioCtx.createOscillator(), gain: audioCtx.createGain() };
        v.osc.type = mods.fae ? 'triangle' : 'sawtooth';
        v.gain.gain.value = 0; v.osc.connect(v.gain); v.gain.connect(masterGain);
        v.osc.start(); return v;
    }

    function toggleSeq(m) { setupEngine(); if(m==='rec') seq.rec=!seq.rec; if(m==='play') seq.play=!seq.play; document.getElementById('btnRec').classList.toggle('active',seq.rec); document.getElementById('btnPlay').classList.toggle('active',seq.play); }
    function toggleFae() { mods.fae = !mods.fae; document.body.classList.toggle('fae-active'); document.getElementById('btnFae').classList.toggle('active', mods.fae); }

    window.addEventListener('touchstart', (e) => {
        if (e.target.tagName === 'BUTTON' || e.target.type === 'range') return;
        setupEngine();
        let angle = (e.touches[0].clientX / window.innerWidth) * 360;
        let freq = 80 + (angle * 1.5);
        if(!voices['live']) voices['live'] = createVoice();
        voices['live'].osc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);
        voices['live'].gain.gain.setTargetAtTime(0.5, audioCtx.currentTime, 0.05);
        
        let hue = (angle / 360);
        let colorStr = `hsl(${hue * 360}, 100%, 50%)`;

        if(seq.rec) {
            seq.data[seq.step] = { freq, color: colorStr };
        }
    });

    window.addEventListener('touchend', () => { if(voices['live']) voices['live'].gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); });

    // --- v1.66 SEQUENCER HEARTBEAT ---
    setInterval(() => {
        if (!audioCtx) return;

        // Clear only the playhead/active classes
        buckets.forEach((b, i) => {
            b.classList.remove('playhead', 'active');
            // Keep buckets colored if they have data
            if (seq.data[i]) {
                b.style.backgroundColor = seq.data[i].color;
                b.style.borderColor = 'rgba(255,255,255,0.4)';
            } else {
                b.style.backgroundColor = '';
                b.style.borderColor = '';
            }
        });

        // Advance Step
        seq.step = (seq.step + 1) % 64;
        let currentBucket = buckets[seq.step];
        let stepData = seq.data[seq.step];

        // Move the playhead
        currentBucket.classList.add('playhead');

        // Play recorded data
        if (stepData && seq.play) {
            if (!voices['seq']) voices['seq'] = createVoice();
            voices['seq'].osc.frequency.setTargetAtTime(stepData.freq, audioCtx.currentTime, 0.02);
            voices['seq'].gain.gain.setTargetAtTime(0.4, audioCtx.currentTime, 0.02);
            currentBucket.classList.add('active');
        } else {
            if (voices['seq']) voices['seq'].gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
        }
    }, 140); 

    // (WebGL rendering omitted for space, keep your previous rendering loop)
</script>
</body>
</html>
